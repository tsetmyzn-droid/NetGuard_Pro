name: netguard_pro
description: A production-ready internet monitoring app for routers.
version: 5.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  dio: ^5.4.0
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.1
  intl: ^0.19.0
  fl_chart: ^0.66.0
  crypto: ^3.0.3
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  xml: ^6.5.0
  network_info_plus: ^5.0.0
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  isar_generator: ^3.1.0
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
