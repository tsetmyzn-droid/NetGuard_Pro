<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="250" y1="50" x2="250" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="mountainGrad" x1="250" y1="350" x2="250" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E293B"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
  </defs>

  <!-- Background Glow -->
  <circle cx="250" cy="250" r="200" fill="url(#shieldGrad)" fill-opacity="0.1" filter="url(#glow)"/>

  <!-- Main Shield Shape -->
  <path d="M250 50C250 50 100 80 100 200C100 320 250 420 250 420C250 420 400 320 400 200C400 80 250 50 250 50Z" fill="url(#shieldGrad)" stroke="#06B6D4" stroke-width="8" stroke-linejoin="round" style="filter: drop-shadow(0 0 20px rgba(34, 211, 238, 0.4));"/>
  
  <!-- Inner Shield Detail -->
  <path d="M250 80C250 80 130 105 130 200C130 290 250 380 250 380C250 380 370 290 370 200C370 105 250 80 250 80Z" fill="black" fill-opacity="0.3" stroke="#22D3EE" stroke-width="2" stroke-dasharray="10 5"/>

  <!-- Infinity Symbol -->
  <path d="M200 230C180 230 160 210 160 190C160 170 180 150 200 150C220 150 230 170 250 190C270 210 280 230 300 230C320 230 340 210 340 190C340 170 320 150 300 150C280 150 270 170 250 190C230 210 220 230 200 230Z" stroke="#22D3EE" stroke-width="12" stroke-linecap="round" style="filter: drop-shadow(0 0 10px #22D3EE);"/>

  <!-- Upward Arrow -->
  <path d="M250 130L220 170H240V210H260V170H280L250 130Z" fill="white" style="filter: drop-shadow(0 0 8px white);"/>

  <!-- Device Icons -->
  <!-- Laptop -->
  <rect x="160" y="270" width="40" height="25" rx="2" stroke="white" stroke-width="2"/>
  <line x1="155" y1="298" x2="205" y2="298" stroke="white" stroke-width="2"/>
  
  <!-- Phone -->
  <rect x="235" y="270" width="30" height="50" rx="4" stroke="white" stroke-width="2"/>
  <circle cx="250" cy="310" r="2" fill="white"/>

  <!-- TV -->
  <rect x="300" y="270" width="45" height="30" rx="2" stroke="white" stroke-width="2"/>
  <path d="M315 300L310 310M330 300L335 310" stroke="white" stroke-width="2"/>

  <!-- Mountains at Base -->
  <path d="M100 380L180 320L250 370L320 310L400 380V420H100V380Z" fill="url(#mountainGrad)" stroke="#334155" stroke-width="2"/>

  <!-- Speed Gauges -->
  <circle cx="150" cy="380" r="20" stroke="#22D3EE" stroke-width="2" stroke-dasharray="60 40"/>
  <path d="M150 380L165 370" stroke="#22D3EE" stroke-width="3" stroke-linecap="round"/>
  
  <circle cx="350" cy="380" r="20" stroke="#22D3EE" stroke-width="2" stroke-dasharray="80 20"/>
  <path d="M350 380L365 375" stroke="#22D3EE" stroke-width="3" stroke-linecap="round"/>

  <!-- Text: NetGuard Pro -->
  <text x="250" y="460" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="32" font-weight="bold" letter-spacing="2">NETGUARD PRO</text>
  
  <!-- Text: حقك ان تعرف -->
  <text x="250" y="490" text-anchor="middle" fill="#22D3EE" font-family="Arial, sans-serif" font-size="24" font-weight="bold" style="filter: drop-shadow(0 0 5px #22D3EE);">حقك ان تعرف</text>
</svg>
