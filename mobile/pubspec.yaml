name: mobile
description: NetGuard Pro Mobile App
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Data & Networking
  dio: ^5.4.0
  dartssh2: ^2.3.1
  connectivity_plus: ^5.0.2
  
  # Storage (Encrypted)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  
  # UI & Experience
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  lucide_icons: ^0.320.0
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
