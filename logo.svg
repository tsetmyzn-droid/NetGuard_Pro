<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Main Cyan Gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00F2FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0066FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00F2FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Metallic Shield Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1E293B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#020617;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="hyperGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Inner Grid Pattern -->
    <pattern id="grid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#22D3EE" stroke-width="0.5" opacity="0.2"/>
    </pattern>

    <!-- Text Paths -->
    <path id="topArc" d="M 80, 256 A 176, 176 0 0, 1 432, 256" />
    <path id="bottomArc" d="M 80, 256 A 176, 176 0 0, 0 432, 256" />
  </defs>

  <!-- Outer Epic Ring -->
  <circle cx="256" cy="256" r="250" fill="#020617" stroke="url(#cyanGrad)" stroke-width="4"/>
  <circle cx="256" cy="256" r="240" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
  <circle cx="256" cy="256" r="230" stroke="url(#cyanGrad)" stroke-width="15" stroke-dasharray="1 10" opacity="0.5"/>

  <!-- Mountains at the bottom -->
  <path d="M100 450L180 380L230 420L300 350L380 430L412 450H100Z" fill="#1E293B" stroke="#00F2FF" stroke-width="2" opacity="0.8"/>
  <path d="M180 380L210 405M300 350L340 390" stroke="#22D3EE" stroke-width="1" opacity="0.5"/>

  <!-- Shield Body -->
  <path d="M256 60C180 60 120 100 90 150C90 300 130 420 256 480C382 420 422 300 422 150C392 100 332 60 256 60Z" fill="url(#shieldGrad)" stroke="url(#cyanGrad)" stroke-width="12" filter="url(#hyperGlow)"/>
  
  <!-- Grid Overlay inside Shield -->
  <path d="M256 60C180 60 120 100 90 150C90 300 130 420 256 480C382 420 422 300 422 150C392 100 332 60 256 60Z" fill="url(#grid)"/>

  <!-- Device Icons (Simplified) -->
  <g stroke="#00F2FF" stroke-width="2" fill="none" opacity="0.8">
    <!-- Laptop (Left) -->
    <rect x="130" y="280" width="40" height="25" rx="2"/>
    <path d="M125 305H175" />
    <!-- Phone (Center-Left) -->
    <rect x="210" y="300" width="15" height="30" rx="2"/>
    <circle cx="217.5" cy="325" r="1.5" fill="#00F2FF"/>
    <!-- TV (Center-Right) -->
    <rect x="280" y="300" width="40" height="25" rx="2"/>
    <path d="M295 325L290 335M305 325L310 335" />
    <!-- Speaker (Right) -->
    <rect x="350" y="280" width="25" height="40" rx="5"/>
    <circle cx="362.5" cy="295" r="5"/>
    <circle cx="362.5" cy="310" r="7"/>
  </g>

  <!-- Gauges (Speedometers) -->
  <g stroke="#00F2FF" stroke-width="2" fill="none" opacity="0.6">
    <path d="M180 360A25 25 0 1 1 220 360" /> <!-- Left Gauge -->
    <path d="M200 360L190 345" stroke-width="3"/>
    <path d="M290 360A25 25 0 1 1 330 360" /> <!-- Right Gauge -->
    <path d="M310 360L325 345" stroke-width="3"/>
  </g>

  <!-- Cyber Lines -->
  <g stroke="#22D3EE" stroke-width="2" opacity="0.6">
    <path d="M150 180L200 230M362 180L312 230" />
    <circle cx="200" cy="230" r="4" fill="#00F2FF" filter="url(#hyperGlow)"/>
    <circle cx="312" cy="230" r="4" fill="#00F2FF" filter="url(#hyperGlow)"/>
  </g>

  <!-- Core Symbol: Infinity + Arrow -->
  <g filter="url(#hyperGlow)">
    <!-- Infinity Symbol (Neon White) -->
    <path d="M180 280C180 230 230 230 256 280C282 330 332 330 332 280C332 230 282 230 256 280C230 330 180 330 180 280Z" stroke="white" stroke-width="20" stroke-linecap="round" fill="none"/>
    <!-- Central Arrow (Cyan Energy) -->
    <path d="M256 140V360M256 140L210 186M256 140L302 186" stroke="#00F2FF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Top Text: NetGuard Pro -->
  <text font-family="Impact, sans-serif" font-size="52" fill="white" filter="url(#hyperGlow)">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">NetGuard Pro</textPath>
  </text>

  <!-- Bottom Text: حقك ان تعرف -->
  <text font-family="Arial, sans-serif" font-size="44" font-weight="900" fill="#00F2FF" filter="url(#hyperGlow)">
    <textPath href="#bottomArc" startOffset="50%" text-anchor="middle">حقك ان تعرف</textPath>
  </text>

  <!-- Energy Nodes -->
  <circle cx="256" cy="30" r="8" fill="#00F2FF" filter="url(#hyperGlow)"/>
  <circle cx="256" cy="482" r="8" fill="#00F2FF" filter="url(#hyperGlow)"/>
</svg>
