name: 🛡️ NetGuard Pro Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lua-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install LuaCheck
        run: sudo apt-get install -y luacheck
        
      - name: Run LuaCheck on Agent Modules
        run: |
          if [ -d "lib/plugins/openwrt/agent/modules/" ]; then
            luacheck lib/plugins/openwrt/agent/modules/ --globals nixio fs uci os io json
          else
            echo "Warning: Lua modules directory not found"
          fi
        
  dart-security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Get dart_code_metrics
        run: flutter pub global activate dart_code_metrics
        
      - name: Run Dart Code Metrics (Security Focus)
        run: dart_code_metrics analyze lib --set-exit-on-violation-level warning
