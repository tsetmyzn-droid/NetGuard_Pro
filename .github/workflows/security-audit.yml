name: 🛡️ NetGuard Pro Security Audit

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lua-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install LuaCheck
        run: sudo apt-get update && sudo apt-get install -y luacheck
        
      - name: Run LuaCheck on Agent Modules
        run: luacheck lib/plugins/openwrt/agent/modules/ --globals nixio fs uci os io json
        continue-on-error: true
        
  dart-security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Run Dart Code Metrics (Security Focus)
        run: |
          flutter pub global activate dart_code_metrics
          dart run dart_code_metrics:metrics analyze lib --set-exit-on-violation-level warning
        continue-on-error: true
        
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true
      
      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true
