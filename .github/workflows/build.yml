name: Build NetGuard Pro (Flet Native)

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cleanup Web Files
        run: |
          if (Test-Path src) { Remove-Item -Recurse -Force src }
          if (Test-Path package.json) { Remove-Item -Force package.json }
          if (Test-Path package-lock.json) { Remove-Item -Force package-lock.json }
          if (Test-Path vite.config.ts) { Remove-Item -Force vite.config.ts }
          if (Test-Path postcss.config.js) { Remove-Item -Force postcss.config.js }
          if (Test-Path tailwind.config.js) { Remove-Item -Force tailwind.config.js }
          if (Test-Path index.html) { Remove-Item -Force index.html }
        shell: pwsh

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flet requests cryptography

      - name: Build Windows EXE
        run: |
          echo y | flet build windows
        shell: cmd

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetGuard-Pro-Windows-EXE
          path: build/windows/*.exe

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cleanup Web Files
        run: |
          rm -rf src package.json package-lock.json vite.config.ts postcss.config.js tailwind.config.js index.html
        shell: bash

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flet requests cryptography

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Verify Java Installation
        run: java -version

      - name: Build Android APK
        run: |
          flet build apk --no-docker

      - name: List Build Output
        run: |
          ls -R build/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetGuard-Pro-Android-APK
          path: build/apk/*.apk
