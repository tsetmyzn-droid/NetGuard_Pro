name: Build NetGuard Pro (Flet Native)

permissions:
  contents: write

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONIOENCODING: utf-8

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cleanup Web Files
        run: |
          if (Test-Path src) { Remove-Item -Recurse -Force src }
          if (Test-Path package.json) { Remove-Item -Force package.json }
          if (Test-Path package-lock.json) { Remove-Item -Force package-lock.json }
          if (Test-Path vite.config.ts) { Remove-Item -Force vite.config.ts }
          if (Test-Path postcss.config.js) { Remove-Item -Force postcss.config.js }
          if (Test-Path tailwind.config.js) { Remove-Item -Force tailwind.config.js }
          if (Test-Path index.html) { Remove-Item -Force index.html }
        shell: pwsh

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint Python Code
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Sanity Check
        run: |
          if (!(Test-Path main.py)) {
            Write-Error "Error: main.py not found!"
            exit 1
          }
        shell: pwsh

      - name: Check for GEMINI_API_KEY
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning:: GEMINI_API_KEY is not set. AI features will be disabled in the build."
          fi
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build Windows EXE
        run: |
          echo y | flet build windows
        shell: cmd

      - name: List Windows Build Output
        run: |
          dir build\windows\
        shell: cmd

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetGuard-Pro-Windows-EXE
          path: build/windows/*.exe
          if-no-files-found: error

  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Cleanup Web Files
        run: |
          rm -rf src package.json package-lock.json vite.config.ts postcss.config.js tailwind.config.js index.html
        shell: bash

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint Python Code
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Java Installation
        run: java -version

      - name: Sanity Check
        run: |
          if [ ! -f main.py ]; then
            echo "Error: main.py not found!"
            exit 1
          fi
        shell: bash

      - name: Check for GEMINI_API_KEY
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning:: GEMINI_API_KEY is not set. AI features will be disabled in the build."
          fi
        shell: bash
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Build Android APK
        run: |
          echo y | flet build apk
        env:
          # This helps in some environments to ensure APK is produced
          FLET_PLATFORM: android

      - name: List Build Output
        run: |
          echo "Listing build directory contents:"
          ls -R build/ || echo "Build directory not found"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NetGuard-Pro-Android-APK
          path: build/apk/*.apk
          if-no-files-found: error
