name: "Build EXE"

on:
  push:
    branches: [ "main", "release/*" ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Hardened Windows Build"
    runs-on: windows-latest
    timeout-minutes: 40
    
    steps:
      - name: "Clone Repository"
        uses: actions/checkout@v4

      - name: "Setup Flutter"
        uses: subosito/flutter-action@v2.23.0
        with:
          channel: 'stable'
          cache: true

      - name: "Build Obfuscated EXE"
        shell: powershell
        run: |
          flutter build windows --release --obfuscate --split-debug-info=build/windows/debug-info
          if ($LASTEXITCODE -ne 0) {
            $ctx = @{
              workflow = "build-exe"
              job = "build"
              step = "flutter-build"
              error = "Windows executable build failed."
              severity = "critical"
            } | ConvertTo-Json
            $ctx | Out-File -FilePath failure-context.json -Encoding utf8
            exit 1
          }

      - name: "Generate Integrity Manifest"
        shell: powershell
        run: |
          mkdir output
          $EXE_PATH = "build/windows/x64/runner/Release/netguard_pro.exe"
          Copy-Item $EXE_PATH -Destination "output/netguard-pro-windows.exe"
          $HASH = (Get-FileHash "output/netguard-pro-windows.exe" -Algorithm SHA256).Hash
          $JSON = @{
              filename = "netguard-pro-windows.exe"
              sha256 = $HASH
              build_timestamp = [System.DateTime]::UtcNow.ToString("yyyy-MM-ddTHH:mm:ssZ")
              commit_sha = "${{ github.sha }}"
              run_id = "${{ github.run_id }}"
          } | ConvertTo-Json
          $JSON | Out-File -FilePath "output/manifest.json" -Encoding utf8

      - name: "Upload Hardened Artifacts"
        uses: actions/upload-artifact@v4
        with:
          name: hardened-windows-bundle
          path: output/
          retention-days: 3

      - name: "Handle Failure Context"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-context-build-exe
          path: failure-context.json
          retention-days: 1
