name: "NetGuard Pro — ULTRA HARDENED CI/CD"

# 🛡️ NetGuard Pro — ULTRA SECURE & ZERO-TRUST BUILD ENGINE
# Principal DevSecOps Architect Implementation
# Strategy: Hardened Supply Chain, Secret Isolation, Forensic Failure Analysis

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Zero Trust Permissions: Revoke all write access
permissions:
  contents: read
  actions: read
  checks: read

concurrency:
  group: ultra-secure-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 🔹 JOB 1: ANALYZE (Security & Quality Gatekeeper)
  analyze:
    name: "🔍 Secure Static Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: "Clone Repository (Hardened)"
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - name: "Setup Flutter SDK (Pin SHA)"
        uses: subosito/flutter-action@44c06581ca4ca3705cdcfc446522f8f66835de38 # v2.16.0
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: "Isolated Dependency Resolution"
        run: |
          if [ ! -f pubspec.lock ]; then exit 1; fi
          flutter pub get --offline || flutter pub get

      - name: "Audit & Analyze (Fatal Warnings)"
        id: analyzer
        run: |
          mkdir -p logs
          flutter analyze --fatal-warnings > logs/analyze.log 2>&1

      - name: "🛡️ Log Sanitization (Anti-Leak)"
        if: always()
        run: |
          if [ -d logs ]; then
            sed -i -E 's/[a-zA-Z0-9_-]{25,}/[REDACTED]/g' logs/*.log || true
          fi

      - name: "🔬 Forensic Failure Extraction"
        if: failure()
        run: |
          echo "REPORT_START" > logs/forensic_report.txt
          grep -n "error" logs/analyze.log >> logs/forensic_report.txt || true
          # Contextual tracing: extracting code lines around failure if possible
          grep -C 5 "error" logs/analyze.log >> logs/forensic_report.txt || true

      - name: "Upload Forensic Artifacts"
        if: failure()
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: forensic-analysis-report
          path: logs/
          retention-days: 3

  # 🔹 JOB 2: BUILD APK (Hardened Android Pipeline)
  build_apk:
    name: "📦 Build Secure APK"
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: "Clone Repository (Hardened)"
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          persist-credentials: false

      - name: "Setup Java (Secure Distribution)"
        uses: actions/setup-java@6101fccd36253ad519960aef65049d5010642f06 # v4.2.1
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: "Setup Flutter SDK"
        uses: subosito/flutter-action@44c06581ca4ca3705cdcfc446522f8f66835de38 # v2.16.0
        with:
          flutter-version: '3.19.0'
          cache: false # Disable cache for primary build to ensure determinism

      - name: "🔐 Ephemeral Keystore & Build"
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.STORE_PASSWORD }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
          ALIAS: ${{ secrets.ALIAS }}
        run: |
          # Nuclear trap for instant cleanup on any signal
          trap "rm -f android/app/release.jks android/key.properties build_apk.log" EXIT SIGINT SIGTERM
          
          # Initialize Secure Files
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          cat <<EOF > android/key.properties
          storePassword=$KS_PASS
          keyPassword=$KEY_PASS
          keyAlias=$ALIAS
          storeFile=release.jks
          EOF
          
          # Hardened Build with Obfuscation
          flutter build apk --release --obfuscate --split-debug-info=build/debug-info --verbose > build_apk.log 2>&1
          
          # Integrity Assurance
          mkdir -p final_output
          cp build/app/outputs/flutter-apk/app-release.apk final_output/netguard-pro-hardened.apk
          sha256sum final_output/netguard-pro-hardened.apk > final_output/integrity.sha256
          sha512sum final_output/netguard-pro-hardened.apk > final_output/integrity.sha512

      - name: "Upload Secure Artifacts"
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: NetGuard-Pro-Hardened-APK
          path: final_output/
          retention-days: 3

      - name: "🔬 Forensic Build Analysis"
        if: failure()
        run: |
          mkdir -p forensic_logs
          # Redact secrets from build log before capture
          sed -E 's/[a-zA-Z0-9._-]{25,}/[REDACTED]/g' build_apk.log > forensic_logs/build_apk_sanitized.log
          tail -n 500 build_apk.log >> forensic_logs/forensic_report.txt || true

      - name: "Upload Forensic Build Logs"
        if: failure()
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: forensic-apk-build-logs
          path: forensic_logs/
          retention-days: 3

  # 🔹 JOB 3: BUILD EXE (Isolated Windows Pipeline)
  build_exe:
    name: "💻 Build Secure Windows EXE"
    needs: analyze
    runs-on: windows-latest
    timeout-minutes: 25
    steps:
      - name: "Clone Repository"
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: "Setup Flutter"
        uses: subosito/flutter-action@44c06581ca4ca3705cdcfc446522f8f66835de38 # v2.16.0
        with:
          flutter-version: '3.19.0'

      - name: "System Configuration"
        run: flutter config --enable-windows-desktop

      - name: "Hardened Build Processing"
        shell: powershell
        run: |
          Start-Transcript -Path "build_exe.log"
          flutter build windows --release
          Stop-Transcript
          if ($LASTEXITCODE -ne 0) { throw "Build Failed" }

      - name: "⚖️ Integrity Verification & Packaging"
        shell: pwsh
        run: |
          mkdir final_exe
          $EXE_PATH = "build/windows/x64/runner/Release/netguard_pro.exe"
          if (Test-Path $EXE_PATH) {
            Copy-Item $EXE_PATH -Destination "final_exe/netguard-pro-windows.exe"
            (Get-FileHash "final_exe/netguard-pro-windows.exe" -Algorithm SHA256).Hash > "final_exe/integrity.sha256"
            (Get-FileHash "final_exe/netguard-pro-windows.exe" -Algorithm SHA512).Hash > "final_exe/integrity.sha512"
          }

      - name: "Upload Windows Artifacts"
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: NetGuard-Pro-Hardened-EXE
          path: final_exe/
          retention-days: 3

      - name: "🔬 Windows Forensic Capture"
        if: failure()
        shell: pwsh
        run: |
          mkdir forensic_windows
          if (Test-Path "build_exe.log") { Copy-Item "build_exe.log" -Destination "forensic_windows/build_sanitized.log" }
          # Basic context capture for failure
          echo "WINDOWS_BUILD_FAILURE_REPORT" > forensic_windows/forensic_report.txt

      - name: "Upload Forensic Windows Logs"
        if: failure()
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.3.4
        with:
          name: forensic-windows-logs
          path: forensic_windows/
          retention-days: 3
